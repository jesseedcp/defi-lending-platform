<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - DeFi Lending Protocol</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">💰 Supply & Withdraw</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="deposit.html" class="nav-link active">Deposit</a>
                <a href="borrow.html" class="nav-link">Borrow</a>
                <a href="advanced.html" class="nav-link">Advanced</a>
            </nav>
            <div class="wallet-display">
                <span id="headerWalletAddress" class="wallet-address-short">未连接</span>
            </div>
        </header>

        <main class="main-content">
            <div id="depositStatusBanner" class="status-banner" style="display: none;"></div>
            <div class="form-container">
                <div class="operation-switch">
                    <button id="depositTab" class="tab-btn active">Supply</button>
                    <button id="withdrawTab" class="tab-btn">Withdraw</button>
                </div>

                <div class="form-group">
                    <label class="form-label">Select Asset</label>
                    <select id="assetSelect" class="form-select"></select>
                </div>

                <div class="form-group">
                    <label class="form-label">Amount</label>
                    <div class="input-with-max">
                        <input type="number" id="amountInput" class="form-input" placeholder="0.00" step="0.000001" min="0">
                        <button id="maxBtn" class="btn-max">MAX</button>
                    </div>
                    <div class="balance-info">
                        <span class="label">Available Balance:</span>
                        <span id="availableBalance" class="value">0.00</span>
                    </div>
                </div>

                <div id="collateralSection" class="form-group">
                    <label class="toggle-label">
                        <span class="toggle-text">Collateral Behavior</span>
                        <input type="checkbox" id="useAsCollateral" class="toggle-checkbox" checked disabled>
                        <span class="toggle-slider"></span>
                    </label>
                    <p id="collateralBehavior" class="help-text">当前合约会自动将已存入资产计入抵押。</p>
                </div>

                <div class="transaction-summary">
                    <h3 class="summary-title">Transaction Summary</h3>
                    <div class="summary-row">
                        <span class="label">Current Supply APY:</span>
                        <span id="currentApy" class="value apy-positive">--%</span>
                    </div>
                    <div class="summary-row">
                        <span class="label">Estimated Annual Yield:</span>
                        <span id="estimatedYield" class="value">--</span>
                    </div>
                    <div class="summary-row">
                        <span class="label">Allowance:</span>
                        <span id="allowanceStatus" class="value">--</span>
                    </div>
                    <div class="summary-row">
                        <span class="label">Pool Liquidity:</span>
                        <span id="liquidityDepth" class="value">--</span>
                    </div>
                </div>

                <button id="actionButton" class="btn-primary btn-block btn-large">
                    💰 Supply
                </button>
                <div id="resultMessage" class="result-message" style="display: none;"></div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 DeFi Lending Protocol. COMP5568 Course Project.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/protocol.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/op.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
